name = "docket-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_URL = "http://localhost:5173"
API_URL = "http://localhost:8787"
OWNER_ID = "seed-user-baseer"
# DATABASE_URL lives in .dev.vars (gitignored).
# Deployed: wrangler secret put DATABASE_URL (or Hyperdrive binding below)

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docket-documents-dev"
preview_bucket_name = "docket-documents-dev"

# Prefer Hyperdrive in staging/production instead of raw DATABASE_URL:
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_LOCAL_OR_DEV_HYPERDRIVE_ID"

[env.staging]
name = "docket-api-staging"
vars = { APP_URL = "https://jobtracker-staging.baseer.co.uk", API_URL = "https://jobtracker-api-staging.baseer.co.uk", OWNER_ID = "seed-user-baseer" }
# Custom domain: attach jobtracker-api-staging.baseer.co.uk in the dashboard
# after baseer.co.uk is on this Cloudflare account (wrangler routes fail otherwise).

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docket-documents-staging"

# [[env.staging.hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_STAGING_HYPERDRIVE_ID"

[env.production]
name = "docket-api"
# API_URL is the live Worker URL until jobtracker-api.baseer.co.uk is attached.
vars = { APP_URL = "https://jobtracker.baseer.co.uk", API_URL = "https://docket-api.humzab1711.workers.dev", OWNER_ID = "seed-user-baseer" }
# Custom domain: attach jobtracker-api.baseer.co.uk in the dashboard
# after baseer.co.uk is on this Cloudflare account (wrangler routes fail otherwise).

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docket-documents"

# [[env.production.hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_PRODUCTION_HYPERDRIVE_ID"
