name = "docket-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_URL = "http://localhost:5173"
API_URL = "http://localhost:8787"
OWNER_ID = "seed-user-baseer"
# DATABASE_URL lives in .dev.vars (gitignored).
# Deployed: wrangler secret put DATABASE_URL (or Hyperdrive binding below)

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docket-documents-dev"
preview_bucket_name = "docket-documents-dev"

# Prefer Hyperdrive in staging/production instead of raw DATABASE_URL:
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_LOCAL_OR_DEV_HYPERDRIVE_ID"

[env.staging]
name = "docket-api-staging"
vars = { APP_URL = "https://docket-staging.baseer.co.uk", API_URL = "https://docket-api-staging.baseer.co.uk", OWNER_ID = "seed-user-baseer", REMINDER_EMAIL_TO = "Djbas8@gmail.com", REMINDER_EMAIL_FROM = "Docket <reminders@baseer.co.uk>" }
# Custom domain: attach docket-api-staging.baseer.co.uk in the dashboard when ready.

[[env.staging.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docket-documents-staging"

[env.staging.triggers]
crons = ["0 8 * * *"]

# [[env.staging.hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_STAGING_HYPERDRIVE_ID"

[env.production]
name = "docket-api"
# API_URL stays on workers.dev until docket-api.baseer.co.uk is attached.
vars = { APP_URL = "https://docket.baseer.co.uk", API_URL = "https://docket-api.humzab1711.workers.dev", OWNER_ID = "seed-user-baseer", REMINDER_EMAIL_TO = "Djbas8@gmail.com", REMINDER_EMAIL_FROM = "Docket <reminders@baseer.co.uk>" }
# Custom domain: attach docket-api.baseer.co.uk in the dashboard when ready.

[[env.production.r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docket-documents"

[env.production.triggers]
crons = ["0 8 * * *"]

# [[env.production.hyperdrive]]
# binding = "HYPERDRIVE"
# id = "REPLACE_PRODUCTION_HYPERDRIVE_ID"
